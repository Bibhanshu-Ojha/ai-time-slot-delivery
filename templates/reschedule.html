{% extends "base.html" %} {% block content %}
<div style="max-width: 600px; margin: 40px auto">
  <div class="card">
    <h2 style="margin-top: 0; color: var(--brand-dark)">Reschedule Shipment</h2>
    <p style="color: var(--text-muted); margin-bottom: 25px">
      Changing plans? Pick a new delivery window for Parcel
      <strong>#{{ parcel_id }}</strong>.
    </p>

    <form method="POST">
      <label>Select New Delivery Time Slot</label>

      <select name="slot_id" required>
        {% for slot in slots %}
        <option value="{{ slot[0] }}">
          {{ slot[1] }} (Available: {{ slot[2] - slot[3] }})
        </option>
        {% endfor %}
      </select>

      <button type="submit" style="width: 100%; margin-top: 20px">
        Confirm New Time
      </button>

      <div style="text-align: center; margin-top: 15px">
        <a
          href="/my_parcels"
          style="
            color: var(--text-muted);
            font-size: 0.9rem;
            text-decoration: none;
          "
          >Go Back</a
        >
      </div>
    </form>
  </div>
</div>
{% endblock %}
